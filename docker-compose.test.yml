services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: svc_notifier_test
      POSTGRES_USER: owner
      POSTGRES_PASSWORD: owner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owner -d svc_notifier_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  nats:
    image: nats:2.12
    command: ["--jetstream"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "nats-server --help > /dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
