name: CI

# CI gates the PR, not the commit: `pull_request` is the only trigger
# (plus manual re-runs). CD owns pushes to main.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt (auto-fix)
    runs-on: arc-ubuntu
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --all
        run: cargo fmt --all

      - name: check + auto-fix
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Already formatted."
            exit 0
          fi

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "::error::Code is not formatted. Run 'cargo fmt --all' locally."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: cargo fmt (auto-fix)"
          git push
          echo "::error::Code was auto-formatted and pushed. Please re-run CI."
          exit 1

  check:
    name: cargo clippy + test
    needs: fmt
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: helm lint chart
        run: helm lint charts/br-svc-notifier

      - name: helm template dry-run
        run: helm template ci charts/br-svc-notifier --debug > /dev/null

  integration:
    name: integration (e2e)
    needs: fmt
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Postgres runs as a plain container (not a `services:` block) so the
      # DB-outage scenarios can `docker pause` it by name.
      - name: Start Postgres
        run: |
          docker run -d --name postgres --network host \
            -e POSTGRES_DB=svc_notifier_test \
            -e POSTGRES_USER=owner \
            -e POSTGRES_PASSWORD=owner \
            postgres:17
          for i in {1..30}; do
            if docker exec postgres pg_isready -U owner -d svc_notifier_test >/dev/null 2>&1; then
              echo "Postgres up"; exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to start" >&2
          docker logs postgres
          exit 1

      # The `services:` block does not let us pass custom args, and NATS
      # JetStream requires `--jetstream`. Run it inline on the host network.
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats --network host nats:2.12 --jetstream
          for i in {1..20}; do
            if nc -z localhost 4222; then echo "NATS up"; exit 0; fi
            sleep 1
          done
          echo "NATS failed to start" >&2
          docker logs nats
          exit 1

      - name: Provision Postgres roles
        run: docker exec -i postgres psql -U owner -d svc_notifier_test < scripts/init-db.sql

      - name: Behavior scenarios (e2e)
        env:
          DATABASE_URL_OWNER: postgres://owner:owner@localhost:5432/svc_notifier_test
          DATABASE_URL_SERVICE_OWNER: postgres://svc_notifier_owner:svc_notifier_owner@localhost:5432/svc_notifier_test
          DATABASE_URL: postgres://svc_notifier_app:svc_notifier_app@localhost:5432/svc_notifier_test
          DATABASE_URL_INGEST: postgres://svc_notifier_ingest:svc_notifier_ingest@localhost:5432/svc_notifier_test
          NATS_URL: nats://localhost:4222
          PORT: "8010"
          RUST_LOG: info
        run: cargo test --tests --no-fail-fast

  audit:
    name: cargo audit (RustSec)
    needs: fmt
    runs-on: arc-ubuntu
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Ignores: upstream transitive advisories not actionable from this
          # crate. Revisit whenever sqlx-postgres migrates off the `rsa`
          # crate.
          #   RUSTSEC-2023-0071 — `rsa` Marvin timing side-channel; no patch
          #     available. Pulled transitively by sqlx-postgres for SCRAM
          #     auth.
          #   RUSTSEC-2026-0097 — rand unsound under custom-logger + ThreadRng
          #     reseed scenario we do not hit.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0097

  deny:
    name: cargo-deny check
    needs: fmt
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  machete:
    name: cargo-machete (unused deps)
    needs: fmt
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  semver:
    name: cargo semver-checks (contract)
    needs: fmt
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: semver-check br-notifier-contract against its latest release
        run: |
          baseline="$(git tag -l 'br-notifier-contract/v*' --sort=-v:refname | head -1)"
          if [ -z "$baseline" ]; then
            echo "No br-notifier-contract release tag yet — nothing to compare against."
            exit 0
          fi
          echo "Baseline: $baseline"
          cargo semver-checks check-release -p br-notifier-contract --baseline-rev "$baseline"

  changelog:
    name: changelog entry present (per crate)
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: each touched crate must update its CHANGELOG
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Not a pull request — nothing to check."
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" --quiet
          changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          echo "$changed"

          fail=0
          if echo "$changed" | grep -qE '^(src/|migrations/|charts/|Cargo\.toml|Dockerfile)' \
            && ! echo "$changed" | grep -qx 'CHANGELOG.md'; then
            echo "::error::svc-notifier code changed without a CHANGELOG.md entry"
            fail=1
          fi
          if echo "$changed" | grep -qE '^br-notifier-contract/(src/|Cargo\.toml)' \
            && ! echo "$changed" | grep -qx 'br-notifier-contract/CHANGELOG.md'; then
            echo "::error::br-notifier-contract changed without a CHANGELOG.md entry"
            fail=1
          fi
          exit $fail

  shellcheck:
    name: shellcheck
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      # --severity=warning: SC1091 (info) fires on every variable-based
      # `source` path and cannot be resolved statically — pure noise here.
      - run: shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh

  secrets:
    name: trufflehog (secret scan)
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
