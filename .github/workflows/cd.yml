name: CD

# Triggered by pushing a version tag: v{version}.
# Runs the same publish.sh script as local — cross-compiles for amd64+arm64,
# packages Docker images, pushes to GHCR with a multi-arch manifest, then
# packages + pushes the Helm chart to the OCI chart registry.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  publish:
    name: Publish
    # The arc-ubuntu runner pool already runs on
    # `ghcr.io/botresources/br-arc-runner:stable`, which ships rust +
    # docker-cli + helm + the basic build toolchain. No `container:`
    # block needed.
    runs-on: arc-ubuntu
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # Static-musl cross-compile via cargo-zigbuild (Zig as the C
      # compiler). Two reasons we are here and not on `*-unknown-linux-gnu`:
      #   1. A glibc-linked binary's runtime libc must stay >= the libc the
      #      binary was built against. The runner image's GLIBC has bumped
      #      past debian:bookworm-slim's GLIBC_2.36 in the past, shipping
      #      CrashLoop releases (see br-graphql-gateway#29).
      #   2. Static-musl decouples the binary from the runtime image's libc
      #      *entirely* — a future runner bump cannot reintroduce the skew
      #      because the binary no longer depends on the runtime libc at all.
      # Why zigbuild and not the system musl-gcc + aarch64-linux-musl-gcc
      # cross toolchains: Zig ships a working musl-aarch64 C cross compiler
      # that handles `ring` + `aws-lc-sys` (pulled transitively by rustls
      # via reqwest/jsonwebtoken/async-nats) cleanly. The musl-cross apt
      # path on aarch64 is notoriously brittle for those crates.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2

      # buildx is needed for `docker build --provenance=false` in publish.sh.
      # NO `setup-qemu-action`: the Dockerfile has no `RUN` instructions, so
      # buildx never has to exec foreign-arch code. Both binaries are static
      # musl built natively above (Rust target = musl, Zig as C linker), and
      # `COPY ${BIN_PATH}` is a layer op the builder does natively. → arm64
      # docker build is now I/O-bound, not CPU-bound.
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image + chart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: ./scripts/publish.sh --skip-checks
