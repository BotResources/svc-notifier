apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "br-svc-notifier.fullname" . }}
  labels:
    {{- include "br-svc-notifier.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "br-svc-notifier.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "br-svc-notifier.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "br-svc-notifier.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "br-svc-notifier.imageRef" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.port | quote }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            {{- with .Values.postgres.trustedNetworkHosts }}
            # Per-host plaintext opt-out (see values.yaml): the lib refuses a
            # plaintext DSN to a remote host unless its host is listed here. The
            # CNPG service host must be declared for an intra-namespace,
            # network-isolated, plaintext Postgres connection.
            - name: TRUSTED_NETWORK_HOSTS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret | quote }}
                  key: {{ .Values.postgres.keys.databaseUrl | quote }}
            - name: DATABASE_URL_OWNER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret | quote }}
                  key: {{ .Values.postgres.keys.databaseUrlOwner | quote }}
            {{- if .Values.nats.url }}
            # DATABASE_URL_INGEST, NATS_URL and the NATS_USER/NATS_PASSWORD
            # credentials are only consumed by the NATS intake path
            # (src/main.rs spawns intake only when NATS_URL is set, and reads
            # DATABASE_URL_INGEST inside that branch).
            # Keep the whole block under a single nats.url gate so that a
            # GraphQL-only deployment (nats.url empty) never references
            # the ingest Postgres key or a NATS credentials Secret —
            # otherwise kubelet would fail the pod with
            # CreateContainerConfigError on a missing Secret key.
            - name: DATABASE_URL_INGEST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret | quote }}
                  key: {{ .Values.postgres.keys.databaseUrlIngest | quote }}
            - name: NATS_URL
              value: {{ .Values.nats.url | quote }}
            {{- if .Values.nats.existingSecret }}
            - name: NATS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.existingSecret | quote }}
                  key: {{ .Values.nats.keys.user | quote }}
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.existingSecret | quote }}
                  key: {{ .Values.nats.keys.password | quote }}
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
