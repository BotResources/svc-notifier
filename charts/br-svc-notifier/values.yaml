# Default values for br-svc-notifier.
# Consuming projects override only what differs from these defaults.

image:
  repository: ghcr.io/botresources/br-svc-notifier
  # Defaults to the chart's appVersion (set in Chart.yaml, kept in lockstep
  # with the Rust crate version). Override to pin a different tag.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

# Rollout strategy. Recreate (not RollingUpdate): the single instance holds
# only per-connection subscription state, so a deploy drops every live
# subscription and the frontend reconnects (see the README reconnect
# protocol). Recreate keeps at most one instance during a release; correctness
# does not depend on it (pushes derive from committed PG state), but it avoids
# two instances briefly contending on one PORT/PVC-less deployment.
strategy:
  type: Recreate

# Port exposed by the container and Service. Must match the PORT env var
# (defaults to 8010 in svc-notifier).
port: 8010

# Postgres connection URLs. All three DSNs (owner, app, ingest) are read
# from an existing Kubernetes Secret — the chart never generates it.
#
# Roles expected by svc-notifier (see scripts/init-db.sql for provisioning):
#   owner               — runs migrations + grants at boot only (that pool then
#                          closes); RLS-exempt, never used by any runtime path
#   svc_notifier_app    — GraphQL user-facing AND the LISTEN/NOTIFY listener,
#                          both subject to user-scoped RLS; the listener
#                          re-reads each signalled row under the recipient's
#                          own scope, never across recipients
#   svc_notifier_ingest — NATS consumer, INSERT+SELECT on notifications only
postgres:
  existingSecret: "br-svc-notifier-postgres"
  # Keys inside the Secret. Values must be full postgres:// DSNs.
  keys:
    databaseUrl: "DATABASE_URL"              # svc_notifier_app DSN
    databaseUrlOwner: "DATABASE_URL_OWNER"   # owner DSN (migrations + grants)
    databaseUrlIngest: "DATABASE_URL_INGEST" # svc_notifier_ingest DSN
  # Deliberate per-host plaintext opt-out for the DB connection. The shared
  # br-util-postgres lib refuses to boot on a plaintext DSN to any remote
  # (non-loopback) host unless that host is declared here — it trusts the
  # network segment, not transport TLS. The platform runs CloudNativePG
  # intra-namespace over plaintext behind a default-deny NetworkPolicy, so the
  # CNPG service host (e.g. "my-db-rw.my-ns.svc") must be listed here for the
  # service to start. When non-empty, rendered as the comma-joined
  # TRUSTED_NETWORK_HOSTS env var. Default empty = TLS required for any remote
  # host (sslmode=require/verify-ca/verify-full in the DSN).
  trustedNetworkHosts: []

# Generic escape hatch: extra environment entries rendered verbatim into the
# container (list of {name, value} or any valid Kubernetes EnvVar — e.g. a
# valueFrom). Use for anything the chart does not expose a dedicated knob for.
extraEnv: []

# NATS connection. Optional — if url is empty, svc-notifier starts without
# NATS intake (graceful degradation: GraphQL API + SSE still work).
nats:
  # URL of the NATS server reachable from within the cluster. Leave blank
  # to disable intake.
  url: "nats://nats:4222"
  # Optional credentials, read from an existing Secret if set.
  existingSecret: ""
  keys:
    user: "NATS_USER"
    password: "NATS_PASSWORD"

# Log filter (tracing_subscriber env filter syntax).
logLevel: "info"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 2
    failureThreshold: 3

service:
  type: ClusterIP
  annotations: {}
  # Extra labels merged onto the Service's metadata.labels, on top of the
  # standard chart labels (which are never overridden). Use this when an
  # external controller discovers this Service by label — e.g. labels matched
  # by a service-discovery selector such as a federation gateway composer that
  # enumerates subgraph Services. Default empty = only the standard labels.
  labels: {}

serviceAccount:
  create: true
  annotations: {}
  # If create=false, the pod uses this existing ServiceAccount name.
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

nodeSelector: {}
# Evict fast on node failure: with a single Recreate replica, a fast reschedule
# is the HA story (see the mono-pod stance). The default 300s unreachable/
# not-ready tolerations would strand the only instance for five minutes; 30s
# brings it back far sooner. Override or clear for multi-replica deployments.
tolerations:
  - key: node.kubernetes.io/unreachable
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 30
  - key: node.kubernetes.io/not-ready
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 30
affinity: {}
