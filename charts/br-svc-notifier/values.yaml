# Default values for br-svc-notifier.
# Consuming projects override only what differs from these defaults.

image:
  repository: ghcr.io/botresources/br-svc-notifier
  # Defaults to the chart's appVersion (set in Chart.yaml, kept in lockstep
  # with the Rust crate version). Override to pin a different tag.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

# Rollout strategy. Recreate (not RollingUpdate): the single instance holds
# only per-connection subscription state, so a deploy drops every live
# subscription and the frontend reconnects (see the README reconnect
# protocol). Recreate keeps at most one instance during a release; correctness
# does not depend on it (pushes derive from committed PG state), but it avoids
# two instances briefly contending on one PORT/PVC-less deployment.
strategy:
  type: Recreate

# Port exposed by the container and Service. Must match the PORT env var
# (defaults to 8010 in svc-notifier).
port: 8010

# Postgres connection URLs. All three DSNs (owner, app, ingest) are read
# from an existing Kubernetes Secret — the chart never generates it.
#
# Roles expected by svc-notifier (see scripts/init-db.sql for provisioning):
#   owner               — runs migrations + grants at boot (that pool then
#                          closes), and backs the LISTEN/NOTIFY listener, which
#                          re-reads committed rows across recipients to build
#                          push events
#   svc_notifier_app    — GraphQL user-facing, subject to user-scoped RLS
#   svc_notifier_ingest — NATS consumer, INSERT+SELECT on notifications only
postgres:
  existingSecret: "br-svc-notifier-postgres"
  # Keys inside the Secret. Values must be full postgres:// DSNs.
  keys:
    databaseUrl: "DATABASE_URL"              # svc_notifier_app DSN
    databaseUrlOwner: "DATABASE_URL_OWNER"   # owner DSN (migrations + grants)
    databaseUrlIngest: "DATABASE_URL_INGEST" # svc_notifier_ingest DSN

# NATS connection. Optional — if url is empty, svc-notifier starts without
# NATS intake (graceful degradation: GraphQL API + SSE still work).
nats:
  # URL of the NATS server reachable from within the cluster. Leave blank
  # to disable intake.
  url: "nats://nats:4222"
  # Optional credentials, read from an existing Secret if set.
  existingSecret: ""
  keys:
    user: "NATS_USER"
    password: "NATS_PASSWORD"

# Log filter (tracing_subscriber env filter syntax).
logLevel: "info"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Probes hit the /health endpoint. Liveness uses a TCP port check so
# transient Postgres/NATS outages do not restart the pod.
probes:
  readiness:
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 2
    failureThreshold: 3

service:
  type: ClusterIP
  annotations: {}

serviceAccount:
  create: true
  annotations: {}
  # If create=false, the pod uses this existing ServiceAccount name.
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

nodeSelector: {}
# Evict fast on node failure: with a single Recreate replica, a fast reschedule
# is the HA story (see the mono-pod stance). The default 300s unreachable/
# not-ready tolerations would strand the only instance for five minutes; 30s
# brings it back far sooner. Override or clear for multi-replica deployments.
tolerations:
  - key: node.kubernetes.io/unreachable
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 30
  - key: node.kubernetes.io/not-ready
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 30
affinity: {}
