[package]
name = "svc-notifier"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "Standalone notification service — NATS intake, GraphQL API, RLS, real-time subscriptions"
repository = "https://github.com/BotResources/svc-notifier"

[dependencies]
br-service-core = { git = "ssh://git@github.com/BotResources/br-service-core", tag = "v0.2.0" }

axum = "0.8"
async-graphql = { version = "7", features = ["uuid", "chrono"] }
async-graphql-axum = "7"
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "json", "uuid", "chrono", "macros", "migrate"] }
async-nats = "0.46"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v7"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
futures = "0.3"
tokio-stream = { version = "0.1", features = ["sync"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[dev-dependencies]
reqwest = { version = "0.12", features = ["json"] }
serial_test = "3"
