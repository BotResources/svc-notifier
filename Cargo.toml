[workspace]
members = ["br-notifier-contract"]
default-members = [".", "br-notifier-contract"]

[package]
name = "svc-notifier"
version = "0.3.0"
edition = "2024"
rust-version = "1.94"
license = "MIT"
description = "Standalone notification service — NATS intake, GraphQL API, RLS, real-time subscriptions"
repository = "https://github.com/BotResources/svc-notifier"

# The implementation has been deliberately removed: this crate is a stub.
# The README and the e2e scenario suite (tests/) are the contract to build.
# Runtime dependencies are the implementer's choice; the [dev-dependencies]
# below belong to the test harness, not to the future implementation.
[dependencies]

[dev-dependencies]
br-notifier-contract = { path = "br-notifier-contract" }
br-core-auth = { git = "https://github.com/BotResources/br-rust-common", package = "br-core-auth", tag = "v0.4.0" }
async-nats = "0.48"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde_json = "1"
serial_test = "3"
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "json", "uuid", "chrono", "macros", "migrate"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v7"] }
