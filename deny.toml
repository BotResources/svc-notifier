[graph]
all-features = true

[advisories]
# Same ignore set as the cargo-audit job (belt-and-braces overlap intended):
#   RUSTSEC-2023-0071 — `rsa` Marvin timing side-channel; no patch available.
#     Pulled transitively by sqlx-postgres for SCRAM auth.
#   RUSTSEC-2026-0097 — rand unsound under a custom-logger + ThreadRng reseed
#     scenario we do not hit.
ignore = ["RUSTSEC-2023-0071", "RUSTSEC-2026-0097"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/BotResources/br-rust-common",
    "https://github.com/BotResources/br-e2e-harness",
]
